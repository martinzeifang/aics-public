site_name: AI Compliance Suite
site_description: Technische Dokumentation der AI Compliance Suite – KI-gestützte Compliance-Werkzeuge für BASO, ICT, DSGVO, NIS2, CRA, AI Act, Gutachten und Risikobewertung
site_author: Martin Zeifang
repo_url: https://github.com/martinzeifang/AI_Compliance_Suite
repo_name: martinzeifang/AI_Compliance_Suite
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  logo: assets/logo_icon.png
  favicon: assets/logo_icon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Zum dunklen Modus wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Zum hellen Modus wechseln
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: de
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: Inhalt

