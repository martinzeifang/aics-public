    - security_utils: api/security-utils.md
    - config_io: api/config-io.md
    - db_security: api/db-security.md
    - fs_perms: api/fs-perms.md
    - json_io: api/json-io.md
    - net_validation: api/net-validation.md
    - redaction: api/redaction.md
    - crypto_at_rest: api/crypto-at-rest.md
    - audit: api/audit.md
  - Workflows:
    - workflows/index.md
    - BASO Workflow: workflows/baso-workflow.md
    - ICT Workflow: workflows/ict-workflow.md
    - CRA Workflow: workflows/cra-workflow.md
    - AI Act Workflow: workflows/ai-act-workflow.md
    - Gutachten Workflow: workflows/gutachten-workflow.md
    - Risikobewertung Workflow: workflows/risikobewertung-workflow.md
  - Templates:
    - templates/index.md
    - CRA Compliance Pack: templates/cra-compliance-pack.md
  - Entwicklung:
    - Setup: development/setup.md
    - Security Tooling: development/security-tooling.md
    - Integrity Check: development/integrity-check.md
    - At-Rest Encryption: development/at-rest-encryption.md
    - UI Menüstruktur: ui/menu-structure.md

extra:
