# Override für lokalen Build (statt Pull aus ghcr.io)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Damit baust du das Image aus dem aktuellen Source-Stand und nutzt es lokal,
# anstatt das ghcr.io-Image zu ziehen.

services:
  web:
    image: aics-web:local
    build:
      context: .
      dockerfile: Dockerfile
  # #1476: nginx ebenfalls aus der Source bauen (sonst würde der gehärtete
  # nginx-Fix nur aus dem ghcr-Image kommen, nicht aus dem öffentlichen Build).
  nginx:
    image: aics-nginx:local
    build:
      context: ./docker
      dockerfile: nginx.Dockerfile
