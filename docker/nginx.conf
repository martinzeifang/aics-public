# Nginx Reverse-Proxy für AI Compliance Suite
# - HTTPS-Termination
# - HTTP→HTTPS Redirect (#269)
# - Frontend Static + Backend /api Proxy

worker_processes auto;
# #1476: unprivileged nginx (UID 101) auf read-only-FS — PID + Temp-Dateien in
# beschreibbare tmpfs-Pfade (/tmp), keine root-Rechte/Capabilities nötig.
pid /tmp/nginx.pid;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # #1482: Connection-Header korrekt setzen. Vorher stand `Connection "upgrade"`
    # FEST auf JEDEM /api-Request — auch auf normalen Requests ohne Upgrade. Das
    # bringt die Keepalive-/Verbindungsbehandlung zwischen nginx und gunicorn
    # durcheinander → über eine lange Session brechen Verbindungen ab ("Verbindung
    # getrennt", bis Hard-Reload). Mit map: nur echte WebSocket/SSE-Upgrades
    # erhalten `Connection: upgrade`, normale Requests `Connection: close`.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # #1476: alle Temp-Pfade nach /tmp (tmpfs, von UID 101 beschreibbar) statt
    # /var/cache/nginx — vermeidet mkdir/chown unter read_only + cap_drop ALL.
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;
    fastcgi_temp_path /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path /tmp/nginx_uwsgi_temp;
    scgi_temp_path /tmp/nginx_scgi_temp;

    # #744 (WP-11, OWASP A05): nginx-Version in Response-Headern + Fehlerseiten
    # nicht preisgeben (Information Disclosure / leichteres Fingerprinting).
    server_tokens off;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    # #1476: nach stdout/stderr loggen (Container-Standard) → keine Schreibrechte
    # in /var/log/nginx nötig (read-only-FS-kompatibel).
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 50M;  # File-Uploads (Evidence)

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- HTTP → HTTPS Redirect (Issue #269) ----
    server {
        # #1476: unprivileged nginx lauscht intern auf 8080 (>1024, keine
        # NET_BIND_SERVICE-Capability nötig). Compose mappt den externen Port darauf.
        listen 8080;
        server_name _;

        # Health check (für Docker) — minimaler JSON-Body, keine Details.
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Redirect alles andere
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS Server ----
    server {
        # #1476: intern 8443 (>1024); externer HTTPS-Port via Compose-Mapping.
        # http2 als eigene Direktive (listen ... http2 ist ab nginx 1.25 deprecated).
        listen 8443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        # #744 (WP-11, OWASP A02): Session-Tickets ohne Key-Rotation brechen
        # Forward Secrecy → deaktivieren.
        ssl_session_tickets off;

        # OCSP-Stapling (#744): reduziert Revocation-Roundtrips beim Client.
        # Funktioniert nur mit einem CA-signierten Cert + Full-Chain (siehe
        # docker-compose.yml: aics_certs mit eigenem Zertifikat mounten/ACME).
        # Bei Self-Signed-Certs ist Stapling wirkungslos → standardmäßig
        # auskommentiert, da Cert-Pfade je Deployment variieren.
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/certs/chain.pem;
        # resolver 1.1.1.1 8.8.8.8 valid=300s;
        # resolver_timeout 5s;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Strikte CSP (Issue #740, WP-07): script-src OHNE unsafe-inline/unsafe-eval.
        # Vue-3-Production-Build benötigt kein unsafe-eval; style-src behält unsafe-inline (Vue Inline-Styles).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

        # API → Backend
        location /api/ {
            proxy_pass http://web:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            # Für long-running Endpoints (Modell-Pull, Issue-Sync, KI-Generation)
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            # Wichtig: SSE/Streaming nicht puffern
            proxy_buffering off;
        }

        # Health (für Monitoring)
        location /health {
            proxy_pass http://web:5000/health;
            access_log off;
        }

        # Gehashte Build-Assets (Dateiname enthält Content-Hash) → lange cachen.
        # Muss VOR `location /` stehen; ^~ verhindert, dass index.html-Regeln greifen.
        location ^~ /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Frontend Static-Files (SPA). index.html NICHT cachen, sonst lädt der
        # Browser nach einem Update alte Asset-Referenzen (Hard-Refresh nötig).
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
            # Security-Header hier erneut setzen: ein add_header in einer location
            # unterdrückt sonst die Server-Level-Header (nginx-Vererbungsregel).
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        }
    }
}
