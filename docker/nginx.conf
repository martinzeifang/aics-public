# Nginx Reverse-Proxy für AI Compliance Suite
# - HTTPS-Termination
# - HTTP→HTTPS Redirect (#269)
# - Frontend Static + Backend /api Proxy

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 50M;  # File-Uploads (Evidence)

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---- HTTP → HTTPS Redirect (Issue #269) ----
    server {
        listen 80;
        server_name _;

        # Health check (für Docker)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect alles andere
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS Server ----
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:" always;

        # API → Backend
        location /api/ {
            proxy_pass http://web:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            # Für long-running Endpoints (Modell-Pull, Issue-Sync, KI-Generation)
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            # Wichtig: SSE/Streaming nicht puffern
            proxy_buffering off;
        }

        # Health (für Monitoring)
        location /health {
            proxy_pass http://web:5000/health;
            access_log off;
        }

        # Frontend Static-Files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }
    }
}
