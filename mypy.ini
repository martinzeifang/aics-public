; mypy-Konfiguration (#745, WP-12) — bewusst LENIENT.
;
; Ziel ist NICHT ein strenger repo-weiter Type-Gate (das wäre ein eigenes
; großes Arbeitspaket), sondern eine grüne, schrittweise erweiterbare Basis.
; Die CI prüft derzeit nur eine kleine, saubere Teilmenge (siehe ci.yml).
;
; Folge-PR (DEFERRED): strikteres Profil + mehr Module + blockierender Gate.

[mypy]
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
warn_unused_ignores = False
warn_redundant_casts = True
no_implicit_optional = True
; Lenient: kein Zwang zu vollständigen Annotationen
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_configs = True
show_error_codes = True

; Saubere Teilmenge, die im CI geprüft wird (siehe ci.yml) — hier strenger.
[mypy-shared.encoding]
check_untyped_defs = True
disallow_incomplete_defs = True

[mypy-shared.redaction]
check_untyped_defs = True
disallow_incomplete_defs = True

[mypy-shared.errors]
check_untyped_defs = True
disallow_incomplete_defs = True

[mypy-server.api._common]
check_untyped_defs = True
disallow_incomplete_defs = True
